<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>电子证明验证</title>
<style>
body{
    margin:0;
    background:#f2f2f2;
    font-family:-apple-system,BlinkMacSystemFont,"Microsoft YaHei",sans-serif;
}
.box{
    max-width:600px;
    margin:60px auto;
    background:#fff;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
    padding:40px;
    text-align:center;
}
.icon{
    font-size:72px;
}
.title{
    color:#d7000f;
    font-size:34px;
    font-weight:bold;
    margin:20px 0;
}
.msg{
    color:#555;
    font-size:18px;
    line-height:1.8;
}
.time{
    margin-top:30px;
    color:#888;
}
</style>
</head>

<body>

<div class="box">

<div class="icon">❌</div>

<div class="title">
该证明已超过有效期限
</div>

<div class="msg">
本证明已失效，不再具有证明效力。<br><br>
如需最新证明，请联系发证单位重新办理。
</div>

<div class="time">
失效日期：2026-07-07
</div>

</div>

</body>
</html>
