<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>扫码结果</title>

    <style>
        /* 去除默认边距 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;

            /* 水平居中 */
            display: flex;
            justify-content: center;

            /* 内容放在顶部 */
            align-items: flex-start;

            /* 与顶部留一点距离 */
            padding-top: 30px;

            min-height: 100vh;
        }

        h1 {
            color: #000000;      /* 黑色 */
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            line-height: 1;
        }
    </style>
</head>

<body>

<h1>该证明已超过有效期限！</h1>

</body>
</html>
